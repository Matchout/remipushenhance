name: Build MiPush Enhance APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2
          cache-read-only: false

      - name: Create project
        shell: bash
        run: |
          mkdir -p app/src/main/java/io/github/mipushenhance
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/resources/META-INF/xposed

          cat > settings.gradle.kts <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }

          rootProject.name = "MiPushEnhance"
          include(":app")
          EOF

          cat > build.gradle.kts <<'EOF'
          plugins {
              id("com.android.application") version "8.7.3" apply false
          }
          EOF

          cat > app/build.gradle.kts <<'EOF'
          plugins {
              id("com.android.application")
          }

          android {
              namespace = "io.github.mipushenhance"
              compileSdk = 35

              defaultConfig {
                  applicationId = "io.github.mipushenhance"
                  minSdk = 26
                  targetSdk = 35
                  versionCode = 7
                  versionName = "1.0.7"
              }
          }

          dependencies {
              compileOnly("io.github.libxposed:api:101.0.1")
          }
          EOF

          cat > app/src/main/res/values/strings.xml <<'EOF'
          <resources>
              <string name="app_name">MiPush Enhance</string>
          </resources>
          EOF

          cat > app/src/main/AndroidManifest.xml <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:label="@string/app_name"
                  android:allowBackup="false"
                  android:supportsRtl="true" />
          </manifest>
          EOF

          printf '%s\n' 'io.github.mipushenhance.MiPushEnhance' > app/src/main/resources/META-INF/xposed/java_init.list
          printf '%s\n' 'com.xiaomi.xmsf' > app/src/main/resources/META-INF/xposed/scope.list
          {
            printf '%s\n' 'minApiVersion=101'
            printf '%s\n' 'targetApiVersion=101'
            printf '%s\n' 'staticScope=false'
          } > app/src/main/resources/META-INF/xposed/module.prop

          cat > app/src/main/java/io/github/mipushenhance/MiPushEnhance.java <<'EOF'
          package io.github.mipushenhance;

          import android.content.pm.ActivityInfo;
          import android.content.pm.ApplicationInfo;
          import android.content.pm.PackageManager;
          import android.content.pm.ResolveInfo;
          import android.util.Log;

          import java.lang.reflect.Method;
          import java.util.ArrayList;
          import java.util.List;

          import io.github.libxposed.api.XposedModule;
          import io.github.libxposed.api.XposedModuleInterface.PackageReadyParam;

          public class MiPushEnhance extends XposedModule {
              private static final String TAG = "MiPushEnhance";
              private static final String TARGET_PACKAGE = "com.xiaomi.xmsf";
              private static final String SECURITY_CENTER = "com.miui.securitycenter";
              private static final String FAKE_RECEIVER = "com.miui.securitycenter.FakeReceiver";

              @Override
              public void onPackageReady(PackageReadyParam param) {
                  final String pkg = param.getPackageName();

                  if (!TARGET_PACKAGE.equals(pkg)) {
                      return;
                  }

                  logi("LOADED package=" + pkg);

                  try {
                      Class<?> cls = Class.forName(
                              "android.app.ApplicationPackageManager",
                              false,
                              param.getClassLoader()
                      );

                      hookQueryBroadcastReceivers(pkg, cls, android.content.Intent.class, int.class, "Intent,int");
                      hookQueryBroadcastReceivers(pkg, cls, android.content.Intent.class, PackageManager.ResolveInfoFlags.class, "Intent,ResolveInfoFlags");
                  } catch (Throwable t) {
                      loge("SETUP_FAILED package=" + pkg, t);
                  }
              }

              private void hookQueryBroadcastReceivers(
                      final String pkg,
                      Class<?> cls,
                      Class<?> arg1,
                      Class<?> arg2,
                      final String signatureName
              ) {
                  try {
                      Method method = cls.getDeclaredMethod("queryBroadcastReceivers", arg1, arg2);

                      hook(method).intercept(chain -> {
                          Object result = chain.proceed();

                          if (!(result instanceof List<?>)) {
                              logi("RESULT_NOT_LIST package=" + pkg + " signature=" + signatureName);
                              return result;
                          }

                          @SuppressWarnings("unchecked")
                          List<ResolveInfo> original = (List<ResolveInfo>) result;

                          if (!original.isEmpty()) {
                              return result;
                          }

                          ArrayList<ResolveInfo> patched = new ArrayList<>(original);
                          patched.add(createFakeResolveInfo());

                          logi("INJECTED package=" + pkg
                                  + " signature=" + signatureName
                                  + " resolvePackageName=" + SECURITY_CENTER
                                  + " afterSize=" + patched.size());

                          return patched;
                      });

                      logi("HOOKED package=" + pkg + " signature=" + signatureName);
                  } catch (NoSuchMethodException e) {
                      logi("METHOD_NOT_FOUND package=" + pkg + " signature=" + signatureName);
                  } catch (Throwable t) {
                      loge("HOOK_FAILED package=" + pkg + " signature=" + signatureName, t);
                  }
              }

              private ResolveInfo createFakeResolveInfo() {
                  ApplicationInfo applicationInfo = new ApplicationInfo();
                  applicationInfo.packageName = SECURITY_CENTER;
                  applicationInfo.flags = ApplicationInfo.FLAG_INSTALLED | ApplicationInfo.FLAG_SYSTEM;
                  applicationInfo.enabled = true;

                  ActivityInfo activityInfo = new ActivityInfo();
                  activityInfo.packageName = SECURITY_CENTER;
                  activityInfo.name = FAKE_RECEIVER;
                  activityInfo.exported = true;
                  activityInfo.enabled = true;
                  activityInfo.applicationInfo = applicationInfo;

                  ResolveInfo info = new ResolveInfo();
                  info.resolvePackageName = SECURITY_CENTER;
                  info.activityInfo = activityInfo;
                  info.isDefault = true;

                  return info;
              }

              private void logi(String msg) {
                  log(Log.INFO, TAG, msg);
              }

              private void loge(String msg, Throwable t) {
                  log(Log.ERROR, TAG, msg, t);
              }
          }
          EOF

      - name: Build debug APK
        run: gradle :app:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MiPushEnhance-1.0.7-debug-apk
          path: app/build/outputs/apk/debug/*.apk

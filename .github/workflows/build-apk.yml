name: Build MiPush Enhance Test APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Create project
        run: |
          mkdir -p app/src/main/java/io/github/mipushenhance
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/resources/META-INF/xposed

          cat > settings.gradle.kts <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }

          rootProject.name = "MiPushEnhanceTest"
          include(":app")
          EOF

          cat > build.gradle.kts <<'EOF'
          plugins {
              id("com.android.application") version "8.7.3" apply false
          }
          EOF

          cat > app/build.gradle.kts <<'EOF'
          plugins {
              id("com.android.application")
          }

          android {
              namespace = "io.github.mipushenhance"
              compileSdk = 35

              defaultConfig {
                  applicationId = "io.github.mipushenhance"
                  minSdk = 26
                  targetSdk = 35
                  versionCode = 3
                  versionName = "1.0-test-api101"
              }
          }

          dependencies {
              compileOnly("io.github.libxposed:api:101.0.1")
          }
          EOF

          cat > app/src/main/res/values/strings.xml <<'EOF'
          <resources>
              <string name="app_name">MiPush Enhance Test</string>
          </resources>
          EOF

          cat > app/src/main/AndroidManifest.xml <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:label="@string/app_name"
                  android:allowBackup="false"
                  android:supportsRtl="true" />
          </manifest>
          EOF

          cat > app/src/main/resources/META-INF/xposed/java_init.list <<'EOF'
          io.github.mipushenhance.MiPushEnhance
          EOF

          cat > app/src/main/resources/META-INF/xposed/module.prop <<'EOF'
          minApiVersion=101
          targetApiVersion=101
          staticScope=false
          EOF

          cat > app/src/main/resources/META-INF/xposed/scope.list <<'EOF'
          android
          com.xiaomi.xmsf
          EOF

          cat > app/src/main/java/io/github/mipushenhance/MiPushEnhance.java <<'EOF'
          package io.github.mipushenhance;

          import android.content.Intent;
          import android.content.pm.PackageManager;
          import android.content.pm.ResolveInfo;
          import android.util.Log;

          import java.lang.reflect.Method;
          import java.util.List;

          import io.github.libxposed.api.XposedModule;
          import io.github.libxposed.api.XposedModuleInterface.PackageReadyParam;

          public class MiPushEnhance extends XposedModule {
              private static final String TAG = "MiPushEnhanceTest";
              private static final String SECURITY_CENTER = "com.miui.securitycenter";

              private String currentPackage = "unknown";

              @Override
              public void onPackageReady(PackageReadyParam param) {
                  currentPackage = param.getPackageName();

                  if (!"android".equals(currentPackage) && !"com.xiaomi.xmsf".equals(currentPackage)) {
                      return;
                  }

                  logi("loaded in package=" + currentPackage);

                  try {
                      Class<?> cls = Class.forName(
                              "android.app.ApplicationPackageManager",
                              false,
                              param.getClassLoader()
                      );

                      hookQueryBroadcastReceivers(cls, Intent.class, int.class, "Intent,int");
                      hookQueryBroadcastReceivers(cls, Intent.class, PackageManager.ResolveInfoFlags.class, "Intent,ResolveInfoFlags");
                  } catch (Throwable t) {
                      loge("hook setup failed", t);
                  }
              }

              private void hookQueryBroadcastReceivers(
                      Class<?> cls,
                      Class<?> arg1,
                      Class<?> arg2,
                      String signatureName
              ) {
                  try {
                      Method method = cls.getDeclaredMethod("queryBroadcastReceivers", arg1, arg2);

                      hook(method).intercept(chain -> {
                          logi("HIT queryBroadcastReceivers(" + signatureName + "), package=" + currentPackage);

                          Object result = chain.proceed();

                          if (!(result instanceof List<?>)) {
                              logi("result is not List: " + result);
                              return result;
                          }

                          @SuppressWarnings("unchecked")
                          List<ResolveInfo> list = (List<ResolveInfo>) result;

                          logi("original result size=" + list.size());

                          if (list.isEmpty()) {
                              ResolveInfo info = new ResolveInfo();
                              info.resolvePackageName = SECURITY_CENTER;
                              list.add(info);

                              logi("INJECTED fake ResolveInfo, resolvePackageName=" + SECURITY_CENTER
                                      + ", afterSize=" + list.size());
                          } else {
                              logi("skip inject because result is not empty");
                          }

                          return result;
                      });

                      logi("hooked queryBroadcastReceivers(" + signatureName + "): " + method);
                  } catch (NoSuchMethodException e) {
                      logi("method not found: queryBroadcastReceivers(" + signatureName + ")");
                  } catch (Throwable t) {
                      loge("hook failed: queryBroadcastReceivers(" + signatureName + ")", t);
                  }
              }

              private void logi(String msg) {
                  log(Log.INFO, TAG, msg);
              }

              private void loge(String msg, Throwable t) {
                  log(Log.ERROR, TAG, msg, t);
              }
          }
          EOF

      - name: Build debug APK
        run: gradle :app:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MiPushEnhanceTest-debug-apk
          path: app/build/outputs/apk/debug/*.apk
